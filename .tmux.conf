# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -sg escape-time 0
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set-option -g default-shell $SHELL
set -g mouse on
setw -g mode-keys vi

# ── Config reload ──────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Pane splits (inherit current path) ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# ── Vim-style pane navigation ──────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Pane titles ────────────────────────────────────────────────────────────────
# Shown in the pane border — useful for labeling agent roles at a glance
set -g pane-border-status top
set -g pane-border-format " #{?pane_title,#{pane_title},#(cd '#{pane_current_path}' && git branch --show-current 2>/dev/null || basename '#{pane_current_path}')} "
bind T command-prompt -p "Pane title:" "select-pane -T '%%'"

# ── Agent context handoff (C-a X) ─────────────────────────────────────────────
# Snapshots the last 500 lines of the focused pane to ~/.tmux-context.md.
#
# Workflow:
#   1. Focus the pane with your active work (code, shell output, logs, etc.)
#   2. Press C-a X to capture it
#   3. Switch to your agent pane and pass the file as context:
#        cat ~/.tmux-context.md | <agent-cli>
#        gh copilot suggest "$(cat ~/.tmux-context.md)"
#        # or point any agent tool directly at the file path
#
# Re-run C-a X at any time to refresh the snapshot.
bind X \
  run-shell 'tmux capture-pane -t "#{pane_id}" -p -S -500 > "$HOME/.tmux-context.md"' \; \
  display "Context captured → ~/.tmux-context.md"

# ── Multi-agent toggles ────────────────────────────────────────────────────────
# C-a S — broadcast keystrokes to all panes (e.g. send stop signal to all agents)
bind S setw synchronize-panes \; display "Sync: #{?pane_synchronized,ON,OFF}"

# C-a e — keep pane alive after process exits to review agent output
bind e setw remain-on-exit \; display "remain-on-exit: #{?window_remain_on_exit,ON,OFF}"

# ── Multi-agent layout (C-a M) ────────────────────────────────────────────────
# Opens a new "agents" window with a labeled 2x3 grid.
# remain-on-exit is ON — finished agents stay visible for output review.
#
# Before pressing C-a M, capture context from your work pane with C-a X.
# Then in any agent pane, reference ~/.tmux-context.md to feed it that context.
#
# Layout:  [ orchestrator | agent-1 ]
#          [              | agent-2 ]
#          [   agent-3    | agent-4 ]
#
# C-a T — rename focused pane
# C-a S — sync all panes (broadcast commands)
# C-a e — toggle remain-on-exit
# C-a X — re-capture context from any pane at any time
bind M \
  new-window -n "agents" \; \
  select-pane -T "orchestrator" \; \
  split-window -h -c "#{pane_current_path}" \; \
  select-pane -T "agent-1" \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-pane -T "agent-2" \; \
  select-pane -t 1 \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-pane -T "agent-3" \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-pane -T "agent-4" \; \
  set-window-option remain-on-exit on \; \
  select-pane -t 1 \; \
  display "Agents ready — use C-a X to capture context, then: cat ~/.tmux-context.md"

# ── Activity & bell alerts ─────────────────────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity on
# Bell in a background pane (e.g. agent signals done) highlights the window tab
setw -g monitor-bell on
set -g bell-action other
set-option -g visual-bell off
set-option -g visual-silence off

# ── Status bar ─────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 2
set -g status-justify left
set-option -g status-style bg=default
# Session name on left — helps orient across multiple project sessions
set -g status-left '#[fg=colour214,bold] #S '
set -g status-left-length 20
# Right: git branch + dirty indicator for current pane, then date/time
# #() runs a shell command — refreshes every status-interval (2s)
# Shows nothing if the pane is not inside a git repo
set -g status-right '#[fg=colour075,bold]#(cd #{pane_current_path}; git branch --show-current 2>/dev/null)#[fg=colour196]#(cd #{pane_current_path}; git diff --quiet 2>/dev/null || echo " ±")#[fg=colour138,bg=default,bold]  %d/%m  %H:%M:%S '
set -g status-right-length 80

# ── Window status ──────────────────────────────────────────────────────────────
setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
setw -g window-status-current-style bg=default,fg=colour11,dim
setw -g window-status-current-format "#[bg=default]#[fg=colour8] #I #[fg=colour8]#[bg=default] #W "
setw -g window-status-bell-style bg=colour1,fg=colour255,bold

# ── Pane appearance ────────────────────────────────────────────────────────────
set -g pane-border-style bg=default
set -g pane-active-border-style bg=default,fg=colour251
setw -g mode-style bg=colour6,fg=colour0
set -g window-style 'fg=colour247,bg=default'

# ── Messages ───────────────────────────────────────────────────────────────────
set -g message-style fg=colour224,bg=colour196,bold
set -g message-command-style fg=blue,bg=yellow

# ── Default session layout ─────────────────────────────────────────────────────
# Standard 6-pane layout on every new session.
# Panes are named at creation time — manual C-a T renames override these.
# For an agent workflow, open a second window with C-a M instead of splitting here.
#
# Layout:
#   ┌──────────┬──────────┐
#   │  main    │secondary │
#   ├──┬──┬────┴──────────┤
#   │a1│a2│      a3   │a4 │
#   └──┴──┴───────────┴───┘
set-hook -g session-created \
  'select-pane -T "main" ; split-window -h ; select-pane -T "secondary" ; split-window -vf ; select-pane -T "aux-1" ; split-window -h ; select-pane -T "aux-2" ; select-pane -t 2 ; split-window -h ; select-pane -T "aux-3" ; split-window -h ; select-pane -T "aux-4" ; select-pane -t 0'
