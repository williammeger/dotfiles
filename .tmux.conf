# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -sg escape-time 0
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set-option -g default-shell $SHELL
set -g mouse on
setw -g mode-keys vi

# ── Config reload ──────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Pane splits (inherit current path) ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# ── Pane navigation & resizing ────────────────────────────────────────────────
# Arrow keys (C-a ←/↑/↓/→) and vim keys (C-a h/j/k/l) both navigate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Pane titles ────────────────────────────────────────────────────────────────
# Smart fallback: manual title (C-a T) → git branch → directory basename
# Useful for knowing which branch/context is in each pane at a glance.
set -g pane-border-status top
set -g pane-border-format " #{?pane_title,#{pane_title},#(cd '#{pane_current_path}' && git branch --show-current 2>/dev/null || basename '#{pane_current_path}')} "
bind T command-prompt -p "Pane title:" "select-pane -T '%%'"

# ── Agent context handoff (C-a X) ─────────────────────────────────────────────
# Snapshots the last 500 lines of the focused pane to ~/.tmux-context.md.
#
# Workflow:
#   1. Focus the pane with your active work (build output, logs, shell, etc.)
#   2. Press C-a X to capture it
#   3. In your Copilot session, reference the snapshot:
#        @~/.tmux-context.md
#
# Re-run C-a X at any time to refresh the snapshot.
bind X \
  run-shell 'tmux capture-pane -t "#{pane_id}" -p -S -500 > "$HOME/.tmux-context.md"' \; \
  display "Context captured → ~/.tmux-context.md"

# ── Status bar ─────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 2
set -g status-justify left
set-option -g status-style bg=default
# Session name left — orient across multiple project sessions
set -g status-left '#[fg=colour214,bold] #S '
set -g status-left-length 20
# Right: git branch + dirty indicator for active pane, then date/time
set -g status-right '#[fg=colour075,bold]#(cd #{pane_current_path}; git branch --show-current 2>/dev/null)#[fg=colour196]#(cd #{pane_current_path}; git diff --quiet 2>/dev/null || echo " ±")#[fg=colour138,bg=default,bold]  %d/%m  %H:%M:%S '
set -g status-right-length 80

# ── Window tabs — active/idle indicators ──────────────────────────────────────
# Active:  orange ● dot + bright white name  (clearly running)
# Idle:    no dot + muted grey name          (quiet, readable but not distracting)
setw -g window-status-current-format "#[fg=colour214] ● #[fg=colour255,bold]#W "
setw -g window-status-format         "#[fg=colour241]  #W "
