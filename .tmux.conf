# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -sg escape-time 0
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set-option -g default-shell $SHELL
set -g mouse on
setw -g mode-keys vi

# ── Config reload ──────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Pane splits (inherit current path) ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# ── Window navigation ──────────────────────────────────────────────────────────
# C-a n       next window
# C-a p       previous window
# C-a 1-9     jump to window by number
# C-a s       session/window/pane tree popup (choose-tree)
# C-a w       pick window from interactive list
# C-a c       new window
# C-a ,       rename window
# C-a q       kill window (all panes)
# mouse click on tab also works (mouse is on)
bind q confirm-before -p "kill window? (y/n)" kill-window
# Override default C-a s with a floating popup version of choose-tree
bind s display-popup -E -w 80% -h 70% "tmux choose-tree -Zs"
# C-a t  — theme preview (scrollable, vim keys)
bind t display-popup -E -w 92% -h 95% "bash ~/.tmux-theme-preview.sh > /tmp/tmux-theme-rendered.txt && less -R --prompt='  ── tmux theme ── j/k scroll · g/G top/bottom · q quit' /tmp/tmux-theme-rendered.txt"

# ── Pane navigation & resizing ────────────────────────────────────────────────
# Arrow keys (C-a ←/↑/↓/→) and vim keys (C-a h/j/k/l) both navigate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour214

# ── Messaging ─────────────────────────────────────────────────────────────────
set -g message-style fg=colour217,bg=colour196,bold

# ── Pane titles ────────────────────────────────────────────────────────────────
# C-a T to set a manual title; shown in status bar for the active pane.
set -g pane-border-status off
bind T command-prompt -p "Pane title:" "select-pane -T '%%'"

# ── Agent context handoff (C-a X) ─────────────────────────────────────────────
# Snapshots the last 500 lines of the focused pane to ~/.tmux-context.md.
#
# Workflow:
#   1. Focus the pane with your active work (build output, logs, shell, etc.)
#   2. Press C-a X to capture it
#   3. In your Copilot session, reference the snapshot:
#        @~/.tmux-context.md
#
# Re-run C-a X at any time to refresh the snapshot.
bind X \
  run-shell 'tmux capture-pane -t "#{pane_id}" -p -S -500 > "$HOME/.tmux-context.md"' \; \
  display "Context captured → ~/.tmux-context.md"

# ── Status bar ─────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 2
set -g status-justify left
set-option -g status-style bg=colour235,fg=colour246
# Left: orange session accent block + muted pane context
set -g status-left '#[bg=colour214,fg=colour232,bold] #S #[bg=colour235,fg=246,nobold] #(echo "#{pane_current_path}" | sed "s|$HOME|~|g" | rev | cut -d/ -f1-2 | rev) '
set -g status-left-length 60
# Right: alert dot + git branch+dirty + date/time
set -g status-right '#{?session_alerts,#[fg=colour196] ● ,}#[fg=colour246] %d %b  %H:%M:%S '
set -g status-right-length 40

# ── Window tabs — active/idle indicators ──────────────────────────────────────
# Active:  orange ● dot + white name
# Idle:    no dot + muted grey name
setw -g window-status-style         bg=colour235,fg=colour252
setw -g window-status-current-style bg=colour235,fg=colour255
setw -g window-status-current-format "#[fg=colour214,bold] ● #[fg=colour255]#W "
setw -g window-status-format        "#[nobold,dim]  #W "

# ── Default session layout ─────────────────────────────────────────────────────
# Standard 6-pane layout on every new session and new window.
#
# Layout:
#   ┌──────────┬──────────┐
#   │  main    │secondary │
#   ├────┬────┬┴───┬──────┤
#   │ a1 │ a2 │ a3 │  a4  │
#   └────┴────┴────┴──────┘
set-hook -g session-created \
  'select-pane -T "main" ; \
   split-window -h -p 50 ; select-pane -T "secondary" ; \
   split-window -vf ; select-pane -T "aux-1" ; \
   split-window -h -p 75 ; select-pane -T "aux-2" ; \
   split-window -h -p 67 ; select-pane -T "aux-3" ; \
   split-window -h -p 50 ; select-pane -T "aux-4" ; \
   select-pane -t 0'

set-hook -g after-new-window \
  'select-pane -T "main" ; \
   split-window -h -p 50 ; select-pane -T "secondary" ; \
   split-window -vf ; select-pane -T "aux-1" ; \
   split-window -h -p 75 ; select-pane -T "aux-2" ; \
   split-window -h -p 67 ; select-pane -T "aux-3" ; \
   split-window -h -p 50 ; select-pane -T "aux-4" ; \
   select-pane -t 0'
