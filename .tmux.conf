# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -sg escape-time 0
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set-option -g default-shell $SHELL
set -g mouse on
setw -g mode-keys vi

# ── Config reload ──────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Pane splits (inherit current path) ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# ── Window navigation ──────────────────────────────────────────────────────────
# C-a n       next window
# C-a p       previous window
# C-a 1-9     jump to window by number
# C-a s       session/window/pane tree popup (choose-tree)
# C-a w       pick window from interactive list
# C-a c       new window
# C-a ,       rename window
# C-a q       kill window (all panes)
# mouse click on tab also works (mouse is on)
bind q confirm-before -p "kill window? (y/n)" kill-window
# Override default C-a s with a floating popup version of choose-tree
bind s display-popup -E -w 80% -h 70% "tmux choose-tree -Zs"

# ── Pane navigation & resizing ────────────────────────────────────────────────
# Arrow keys (C-a ←/↑/↓/→) and vim keys (C-a h/j/k/l) both navigate panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style bg=colour235,fg=colour238
set -g pane-active-border-style bg=colour236,fg=colour251

# ── Messaging ─────────────────────────────────────────────────────────────────
set -g message-style fg=black,bg=colour196,bold

# ── Pane titles ────────────────────────────────────────────────────────────────
# Smart fallback: manual title (C-a T) → git branch → directory basename
# Useful for knowing which branch/context is in each pane at a glance.
set -g pane-border-status top
set -g pane-border-format " #{?pane_title,#{pane_title},#(cd '#{pane_current_path}' && git rev-parse --git-dir >/dev/null 2>&1 && git branch --show-current 2>/dev/null || basename '#{pane_current_path}')} "
bind T command-prompt -p "Pane title:" "select-pane -T '%%'"

# ── Agent context handoff (C-a X) ─────────────────────────────────────────────
# Snapshots the last 500 lines of the focused pane to ~/.tmux-context.md.
#
# Workflow:
#   1. Focus the pane with your active work (build output, logs, shell, etc.)
#   2. Press C-a X to capture it
#   3. In your Copilot session, reference the snapshot:
#        @~/.tmux-context.md
#
# Re-run C-a X at any time to refresh the snapshot.
bind X \
  run-shell 'tmux capture-pane -t "#{pane_id}" -p -S -500 > "$HOME/.tmux-context.md"' \; \
  display "Context captured → ~/.tmux-context.md"

# ── Status bar ─────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 2
set -g status-justify left
set-option -g status-style dim,bg=colour234,fg=colour137
# Left: session name + window/pane counts (all native, no shell calls)
set -g status-left '#[fg=colour214,bold] #S #[fg=colour241,nobold] #{session_windows}w #{window_panes}p '
set -g status-left-length 40
# Right: alert dot (native) + git branch+dirty (one shell call) + date/time
# #{session_alerts} fires on bell or activity in any window
set -g status-right '#{?session_alerts,#[fg=colour196] ● ,}#[fg=colour075,bold]#(cd #{pane_current_path}; git rev-parse --git-dir >/dev/null 2>&1 && { b=$(git branch --show-current 2>/dev/null); git diff --quiet HEAD 2>/dev/null || d=" ±"; echo "$b$d"; })#[fg=colour138,bg=default,bold]  %d %b  %H:%M:%S '
set -g status-right-length 80

# ── Window tabs — active/idle indicators ──────────────────────────────────────
# Active:  orange ● dot + bright white name  (clearly running)
# Idle:    no dot + muted grey name          (quiet, readable but not distracting)
setw -g window-status-style         bg=default,fg=default
setw -g window-status-current-style bg=default,fg=default
setw -g window-status-current-format "#[fg=colour214] ● #[fg=colour138,bold]#W "
setw -g window-status-format         "#[fg=colour250,bg=default]  #W "

# ── Default session layout ─────────────────────────────────────────────────────
# Standard 6-pane layout on every new session.
#
# Layout:
#   ┌──────────┬──────────┐
#   │  main    │secondary │
#   ├────┬────┬┴───┬──────┤
#   │ a1 │ a2 │ a3 │  a4  │
#   └────┴────┴────┴──────┘
set-hook -g session-created \
  'select-pane -T "main" ; \
   split-window -h -p 50 ; select-pane -T "secondary" ; \
   split-window -vf ; select-pane -T "aux-1" ; \
   split-window -h -p 75 ; select-pane -T "aux-2" ; \
   split-window -h -p 67 ; select-pane -T "aux-3" ; \
   split-window -h -p 50 ; select-pane -T "aux-4" ; \
   select-pane -t 0'
